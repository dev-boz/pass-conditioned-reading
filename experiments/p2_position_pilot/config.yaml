# P2 — position-token pilot (prompt-level PROXY for the explicit-position signal).
# The V1 PoC eval set was NOT locatable in Phase-0 inventory (it does not exist
# in the public parent repo), so per the brief's contingency the harness runs
# against the P1 document, using the P1 coupled arm's state snapshots as the
# eval items. Noted in RESULTS.md. The trained explicit-field-vs-trajectory
# comparison is E1' — NOT what this measures.

p1_dir: ../p1_micro_pilot
states_file: ../p1_micro_pilot/transcripts/coupled_states.json   # s_{k-1} source
seed: 42

model:           # same local 7B as P1 (D11)
  server_exe: ../../models/llamacpp/llama-server.exe
  model_path: ../../models/Qwen2.5-7B-Instruct-Q4_K_M.gguf
  ctx: 12288
  port: 8087
  threads: 8
  max_tokens: 700
  temperature: 0.0

conditions:
  with_position: true     # structured field:  position: {k: 3, K: 6}
  no_position: true       # no position information at all

# Position-appropriateness heuristic (D20) — reported as heuristic, not claim.
appropriateness:
  early_max_t: 0.3333     # t=(k-1)/(K-1) < 1/3  -> early
  late_min_t: 0.6667      # t >= 2/3             -> late
  early_add_frac_min: 0.5         # early passes should be scaffold-like (ADD-heavy)
  late_edit_frac_min: 0.3         # late passes should be edit-like (REPLACE/REMOVE)
