# E0-FINAL — non-provisional regime gate. PRE-REGISTERED gate restated unchanged
# from the provisional run; only the compressor (production Haiku) and the Tier-B
# instrument fix (chunk-and-pool) differ. See E0_FINAL_PLAN.md, DECISIONS D29.

views_path: ../../data/views/views_haiku_final.jsonl   # production views: claude-haiku-4-5 (D29), merged across delivery paths (D30); build via `python -m pca.merge_paths`
seed: 42

split:                  # by doc_id, never by view (unchanged)
  train: 0.70
  val: 0.15
  test: 0.15

buckets:
  early_max_t: 0.3333
  mid_max_t: 0.6667

tier_a:
  features: [len_tokens, len_chars, type_token_ratio, stopword_frac,
             mean_sent_len_tokens, n_sentences, punct_density, numeral_frac,
             cap_word_frac, mean_word_len]
  model: logreg
  max_iter: 2000

tier_b:
  encoder: sentence-transformers/all-MiniLM-L6-v2
  chunk_pool: true        # E0-final fix: see RESULTS.md / run.py — pool over the whole view
  probes:
    linear: {model: logreg, max_iter: 2000}
    mlp: {hidden: 256, max_iter: 400, early_stopping: true}

targets:
  exact_k: {metrics: [accuracy, macro_f1, confusion_matrix, acc_within_1]}
  bucket: {metrics: [accuracy]}
  norm_position: {model: ridge, metrics: [r2]}

# ---- PRE-REGISTERED GATE (verbatim, unchanged from the provisional run) ----
gate:
  metric: tier_b_bucket_test_accuracy
  time_agnostic_min: 0.90               # >= 0.90 -> regime = time-agnostic
  signal_carrying_max: 0.70             # <= 0.70 -> regime = signal-carrying
  provisional: false                    # production compressor; drop the label in GATES
                                        # only if the run stands on its own
